name: Deploy to GitHub Pages

on:
  # main 브랜치에 push할 때마다 자동 배포
  push:
    branches: [main]
  # GitHub Actions 탭에서 수동 실행도 가능
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      # withastro/action이 Node 설치 → npm install → astro build → 업로드까지 처리.
      # astro.config.mjs가 GITHUB_REPOSITORY 환경 변수를 읽어
      # site(https://아이디.github.io)와 base(/저장소명)를 자동으로 맞춘다.
      - name: Astro 빌드
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 새로 발행된 글이 있으면 구독 회원에게 이메일을 보내고, 성공한 글만
      # notified-posts.json에 기록한다(도메인·API 키 문제 등으로 요청 자체가
      # 실패하면 기록하지 않아 다음 배포에서 자동으로 재시도된다). 시크릿이
      # 비어 있으면(아직 Resend 연동 전) 오류로 남기되 사이트 배포에는
      # 영향이 없다(이미 위 deploy에서 끝났음).
      - name: 새 글 발행 이메일 알림
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/notify-new-posts.mjs || echo "알림 발송 건너뜀(다음 배포에서 재시도)"

      - name: notified-posts.json 커밋 (변경 있을 때만)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/notified-posts.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "유지보수: 새 글 이메일 알림 발송 기록"
            git pull --rebase origin main
            git push
          fi
