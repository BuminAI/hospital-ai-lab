name: Update Recommended Videos

on:
  schedule:
    # 매주 월·수·금, 새 영상을 최대 3개 추가 (기존 항목은 누적 보존).
    # GitHub cron은 UTC 기준 + 수 시간씩 지연될 수 있어, 본 실행(KST 09:07)과
    # 예비 실행(KST 15:07)을 함께 건다. 스크립트가 "최근 24시간 내 자동 추가가
    # 있으면 건너뛰기" 하므로 두 번 모두(지연 포함) 돌아도 한 주기에 3개를
    # 넘지 않는다.
    - cron: '7 0 * * 1,3,5' # KST 월·수·금 09:07
    - cron: '7 6 * * 1,3,5' # KST 월·수·금 15:07 (예비)
  workflow_dispatch:

permissions:
  contents: write # 커밋·푸시
  actions: write # deploy.yml 수동 트리거(gh workflow run)

# 자기 자신의 중복 실행만 직렬화한다. deploy.yml의 'pages' 그룹과 공유하면
# 크론 실행이 오너 푸시의 배포 대기분을 취소할 수 있어 분리한다.
# (자세한 사유는 update-news.yml의 동일 주석 참조)
concurrency:
  group: update-videos
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 실패해도(유튜브 일시 차단 등) 워크플로 전체가 멈추지 않도록: 수집 실패 시
      # 기존 목록을 그대로 두고 다음 단계로 넘어간다.
      - name: 추천 영상 수집 (신규 최대 3개 누적)
        run: node scripts/fetch-videos.mjs || echo "수집 건너뜀(기존 목록 유지)"

      - name: recommended-videos.json 커밋 (변경 있을 때만)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/recommended-videos.json
          if git diff --cached --quiet; then
            echo "새 영상 없음 — 커밋·배포 생략"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "유지보수: 추천 영상 자동 추가"
            # 그 사이 다른 커밋이 main에 올라왔어도 밀리지 않도록 rebase 후 push
            git pull --rebase origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 배포는 deploy.yml에 위임한다 (항상 최신 main을 빌드하므로 안전).
      # workflow_dispatch는 GITHUB_TOKEN 재귀 방지의 예외라 직접 실행 가능.
      - name: 배포 트리거 (deploy.yml)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml
