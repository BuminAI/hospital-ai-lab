name: Update Recommended Videos

on:
  schedule:
    # 매주 월·수·금, 새 영상을 최대 3개 추가 (기존 항목은 누적 보존).
    # GitHub cron은 UTC 기준 + 수 시간씩 지연될 수 있어, 본 실행(KST 09:07)과
    # 예비 실행(KST 15:07)을 함께 건다. 스크립트가 "같은 날 이미 추가했으면
    # 건너뛰기" 하므로 두 번 모두 돌아도 하루 3개를 넘지 않는다.
    - cron: '7 0 * * 1,3,5' # KST 월·수·금 09:07
    - cron: '7 6 * * 1,3,5' # KST 월·수·금 15:07 (예비)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# 배포 워크플로(deploy.yml)와 같은 그룹으로 묶어 동시 배포 충돌을 막는다
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 실패해도(유튜브 일시 차단 등) 워크플로 전체가 멈추지 않도록: 수집 실패 시
      # 기존 목록을 그대로 두고 다음 단계로 넘어간다.
      - name: 추천 영상 수집 (신규 최대 3개 누적)
        run: node scripts/fetch-videos.mjs || echo "수집 건너뜀(기존 목록 유지)"

      - name: recommended-videos.json 커밋 (변경 있을 때만)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/recommended-videos.json
          if git diff --cached --quiet; then
            echo "새 영상 없음 — 커밋·배포 생략"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "유지보수: 추천 영상 자동 추가"
            # 그 사이 다른 커밋이 main에 올라왔어도 밀리지 않도록 rebase 후 push
            git pull --rebase origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 봇 커밋은 deploy.yml을 트리거하지 못하므로(GitHub 재귀 방지)
      # 이 워크플로가 직접 빌드·배포까지 수행한다. 변경 있을 때만.
      - name: Astro 빌드
        if: steps.commit.outputs.changed == 'true'
        uses: withastro/action@v3

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
