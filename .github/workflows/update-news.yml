name: Update AI News

on:
  schedule:
    # 1시간 간격 (UTC 기준, 매시 :17). GitHub cron은 예약을 자주 지연·누락시켜
    # (3시간 간격으로 걸었을 때 실측: 하루 2~3회만 실행, 최대 13시간 공백)
    # 촘촘히 걸어야 실제 실행 횟수가 목표에 근접한다. 스크립트가 "새 기사
    # 있을 때만" 파일을 바꾸므로 자주 돌아도 불필요한 커밋·배포는 없다.
    # 정각(:00)은 예약이 몰려 지연이 심해 :17로 비켜 둔다.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write # 커밋·푸시
  actions: write # deploy.yml 수동 트리거(gh workflow run)

# 자기 자신의 중복 실행만 직렬화한다. 배포 워크플로(deploy.yml)의 'pages'
# 그룹과 공유하지 않는 이유: 한 그룹에는 대기 1개만 남고 새 실행이 대기분을
# "취소"하는데, 크론이 자주 도는 이 워크플로가 그룹에 끼면 오너 푸시로 생긴
# deploy 대기 실행을 취소해 버려, 크론 쪽이 '변경 없음'으로 끝나는 경우
# 오너 변경분이 영영 배포되지 않는 구멍이 생긴다.
concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 수집 실패(사이트 장애 등)는 오류로 남기지 않는다 — 파일이 안 바뀌므로
      # 아래 커밋 단계가 '변경 없음'으로 안전하게 끝난다.
      - name: 뉴스 수집 (신규 기사 누적)
        run: node scripts/fetch-news.mjs || echo "수집 건너뜀(기존 목록 유지)"

      - name: news.json 커밋 (변경 있을 때만)
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json
          if git diff --cached --quiet; then
            echo "새 기사 없음 — 커밋·배포 생략"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "유지보수: AI 뉴스 자동 업데이트"
            # 그 사이 다른 커밋이 main에 올라왔어도 밀리지 않도록 rebase 후 push
            git pull --rebase origin main
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 봇 커밋의 push는 재귀 방지 때문에 deploy.yml을 자동 트리거하지 못하지만,
      # workflow_dispatch는 예외라서 GITHUB_TOKEN으로 직접 실행할 수 있다.
      # 배포를 deploy.yml 한 곳에 모아 두면 어떤 배포든 항상 최신 main을
      # 빌드하므로, 배포 대기열에서 실행이 취소되어도 사이트가 뒤처지지 않는다.
      - name: 배포 트리거 (deploy.yml)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml
